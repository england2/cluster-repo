name: CI Manual Testing

permissions:
  contents: read
  packages: write

on:
  push:

# ai--done
# build and push both images to ghcr
# programmatically tag them with the module name (e.g service2)
# (in container dir) head -n1 go.mod
# (or use a more idiomatic method)
#
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
    strategy:
      matrix:
        container_dir:
          - ci-cd-test/container1
          - ci-cd-test/container2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute module name
        id: module
        shell: bash
        run: |
          set -euo pipefail
          gomod="$(find "${{ matrix.container_dir }}" -maxdepth 3 -type f -name go.mod | head -n1)"
          if [ -z "${gomod}" ]; then
            echo "no go.mod found under ${{ matrix.container_dir }}" >&2
            exit 1
          fi

          module_name="$(sed -n 's/^module[[:space:]]\+//p' "${gomod}" | head -n1)"
          if [ -z "${module_name}" ]; then
            echo "failed to parse module name from ${gomod}" >&2
            exit 1
          fi

          echo "module_name=${module_name}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.container_dir }}
          file: ${{ matrix.container_dir }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.module.outputs.module_name }}
            ${{ env.IMAGE_REPO }}:${{ steps.module.outputs.module_name }}-${{ github.sha }}
